name: Update README cards
on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Generate stats card (no stars)
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          token: ${{ secrets.GH_PAT }}
          options: username=MickLesk&show_icons=true&theme=tokyonight&count_private=true&include_all_commits=true&hide=stars
          path: profile-stats.svg

      - name: Generate languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          token: ${{ secrets.GH_PAT }}
          options: username=MickLesk&layout=compact&theme=tokyonight
          path: profile-langs.svg

      - name: Generate ProxmoxVE Pin card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          token: ${{ secrets.GH_PAT }}
          options: username=community-scripts&repo=ProxmoxVE&theme=tokyonight&show_owner=true
          path: proxmox-pin.svg

      - name: Commit cards
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add *.svg
          git commit -m "Update all static cards" || exit 0
          git push
